<style>
  * {
    box-sizing: border-box;
  }
  html,
  body {
    height: 100%;
  }
  body {
    font:
      12px/1.5 -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      sans-serif;
    margin: 0;
    padding: 14px;
    color: #2c2c34;
    background: linear-gradient(160deg, #f6f7fb 0%, #eef0f7 100%);
    display: flex;
    flex-direction: column;
  }
  .card {
    background: #fff;
    border: 1px solid #e6e8f0;
    border-radius: 10px;
    padding: 9px 11px;
    box-shadow: 0 1px 2px rgba(30, 34, 60, 0.04);
  }
  #status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    color: #1f2330;
  }
  #dot {
    flex: none;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #e0555b;
    box-shadow: 0 0 0 3px rgba(224, 85, 91, 0.15);
    transition:
      background 0.2s,
      box-shadow 0.2s;
  }
  #dot.on {
    background: #22a06b;
    box-shadow: 0 0 0 3px rgba(34, 160, 107, 0.15);
  }
  #hint {
    color: #6b6f7d;
    margin-top: 8px;
    font-size: 11px;
    line-height: 1.45;
  }
  #credit {
    margin-top: auto;
    padding-top: 10px;
    text-align: center;
    color: #a0a4b0;
    font-size: 10px;
  }
  #credit a {
    color: #8288a0;
    text-decoration: none;
  }
  #credit a:hover {
    text-decoration: underline;
  }
</style>

<div class="card">
  <div id="status-row">
    <span id="dot"></span><span id="status">Connecting…</span>
  </div>
  <div id="hint">
    Keep this window open while AI works. Open the plugin in each file you want
    it to edit.
  </div>
</div>
<div id="credit">
  <a href="https://github.com/hoangann2000/figma-mcp-console" target="_blank"
    >@hoangann2000</a
  >
</div>

<script>
  // Bridge UI: connect to the shared MCP bridge on localhost and relay
  // frames between it and the plugin main thread.
  //
  // One bridge serves every plugin window and every MCP session, so there is
  // a single well-known port (also the only one the manifest's
  // devAllowedDomains permits). While disconnected we retry on a short loop;
  // background tabs throttle timers, so a visibility change and a click on
  // the status line also trigger an immediate attempt.
  const PORT = 2000,
    RETRY = 1000;
  let ws = null; // open connection, null while disconnected
  let attempt = null; // socket currently trying to connect
  let reg = null; // {key, name} of this file, sent by the main thread

  function setStatus(connected, text) {
    document.getElementById("dot").className = connected ? "on" : "";
    document.getElementById("status").textContent = text;
  }

  function label() {
    return reg ? "Connected · " + reg.name : "Connected (port " + PORT + ")";
  }

  function sendRegister() {
    if (ws && ws.readyState === WebSocket.OPEN && reg) {
      ws.send(JSON.stringify({ register: reg }));
    }
  }

  function connect() {
    if (ws || attempt) return;
    let sock;
    try {
      sock = new WebSocket("ws://localhost:" + PORT + "/ws");
    } catch (e) {
      schedule();
      return;
    }
    attempt = sock;
    sock.onopen = () => {
      attempt = null;
      ws = sock;
      sendRegister();
      setStatus(true, label());
    };
    sock.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.hello) {
        setStatus(true, label());
        return;
      }
      // Relay server request to the plugin main thread.
      parent.postMessage({ pluginMessage: msg }, "*");
    };
    sock.onclose = () => {
      if (attempt === sock) attempt = null;
      if (ws === sock) ws = null;
      if (!ws) {
        setStatus(false, "Searching for MCP server…");
        schedule();
      }
    };
    sock.onerror = () => {
      try {
        sock.close();
      } catch (e) {}
    };
  }

  let retryTimer = null;
  function schedule() {
    if (retryTimer) return;
    retryTimer = setTimeout(() => {
      retryTimer = null;
      connect();
    }, RETRY);
  }

  // Relay plugin main-thread frames: the register frame is cached here and
  // re-sent on every reconnect; everything else goes to the server.
  window.onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (!msg) return;
    if (msg.register) {
      reg = msg.register;
      sendRegister();
      if (ws) setStatus(true, label());
      return;
    }
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    }
  };

  document.getElementById("status-row").onclick = () => connect();
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && !ws) connect();
  });

  connect();
</script>
