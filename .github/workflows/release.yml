name: release

# On pushing tag vX.Y.Z → package plugin/ into plugin.zip and create a GitHub Release.
# (Binaries are distributed via npm; no build needed here.)
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package Figma plugin
        run: cd plugin && zip -r ../plugin.zip .

      - name: Create GitHub release with plugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" plugin.zip --title "${GITHUB_REF_NAME}" --generate-notes
